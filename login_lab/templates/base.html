<!DOCTYPE html>
<html>
<head>
    <title>Flask Auth App</title>
</head>
<body>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p style="color:green;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
